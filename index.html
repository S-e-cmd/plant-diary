var(--muted);font-weight:700}.seg button.active{background:#fff;color:var(--green);box-shadow:0 1px 5px #0002}.label{display:block;font-size:12px;font-weight:700;margin:9px 0 5px;color:#435047}.date,input,select,textarea{width:100%;border:1px solid #ccd7cf;background:#fff;border-radius:10px;padding:10px;outline:none}.date:focus,input:focus,select:focus,textarea:focus{border-color:var(--green2);box-shadow:0 0 0 3px #22c55e20}textarea{resize:vertical;min-height:120px;line-height:1.55}.primary{width:100%;border:0;border-radius:11px;background:var(--green);color:#fff;padding:12px;font-weight:800;margin-top:11px}.primary:disabled{opacity:.5}.secondary{border:1px solid #b9cbbd;background:#fff;color:var(--green);border-radius:9px;padding:8px 11px;font-weight:700}.danger{border:0;background:#fee2e2;color:var(--red);border-radius:8px;padding:7px 9px}.preview{display:none}.preview.show{display:block}.entry{border:1px solid var(--line);border-radius:12px;padding:11px;margin-top:10px;background:#fbfdfb}.entry-head{display:flex;justify-content:space-between;align-items:center}.badge{font-size:11px;font-weight:800;padding:4px 8px;border-radius:999px;background:#dcfce7;color:var(--green)}.badge.plan{background:#ffedd5;color:var(--warn)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.entry textarea{min-height:70px}.viewbar{display:flex;gap:5px;margin-bottom:10px}.viewbar button{flex:1;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;color:var(--muted);font-weight:700}.viewbar button.active{background:var(--green);color:#fff}.period{display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px}.period button{width:38px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px}.period b{font-size:14px}.log-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px}.log-top{display:flex;justify-content:space-between;gap:10px}.log-date{font-size:11px;color:var(--muted)}.log-title{font-weight:800;margin:3px 0}.log-meta{font-size:12px;color:var(--muted);line-height:1.5}.actions{display:flex;gap:6px;justify-content:flex-end;margin-top:8px}.actions button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 9px;font-size:12px}.empty{text-align:center;color:var(--muted);padding:35px 10px}.nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:#fffc;border-top:1px solid var(--line);padding:5px 5px max(7px,env(safe-area-inset-bottom));backdrop-filter:blur(10px)}.nav button{flex:1;border:0;background:transparent;color:#7b867e;padding:7px 2px;font-size:10px;font-weight:700}.nav button span{display:block;font-size:20px;line-height:22px}.nav button.active{color:var(--green)}.toast{position:fixed;left:50%;top:18px;transform:translate(-50%,-80px);background:#17211aeF;color:#fff;border-radius:999px;padding:10px 16px;font-size:13px;transition:.25s;z-index:100;max-width:90%;text-align:center}.toast.show{transform:translate(-50%,0)}.overlay{display:none;position:fixed;inset:0;background:#0008;z-index:80;align-items:flex-end;justify-content:center}.overlay.show{display:flex}.modal{background:#fff;width:100%;max-width:700px;max-height:90dvh;overflow:auto;border-radius:18px 18px 0 0;padding:17px 15px max(20px,env(safe-area-inset-bottom))}.modal h2{font-size:17px;margin:0 0 10px}.modal-head{display:flex;justify-content:space-between}.close{border:0;background:#eee;border-radius:50%;width:32px;height:32px}.weather{font-size:12px;color:var(--muted);margin-top:4px}.settings-note{font-size:13px;line-height:1.65;color:var(--muted)}@media(min-width:701px){.app{position:relative;height:min(900px,100dvh)}.overlay{align-items:center}.modal{border-radius:18px;max-height:80vh}}

<body>
<div class="app">
  <header class="header"><h1>植物栽培管理日誌</h1><button class="sync" id="syncBtn">更新</button></header>
  <section class="pinned" id="pinned"><div class="pin-head"><div><div class="pin-title">作業予定 <span id="overdue"></span></div><div class="weather" id="weather">天気データを取得中</div></div><button class="pin-toggle" id="pinToggle">展開</button></div><div class="pin-row" id="pinRow"></div><div class="pin-more" id="pinMore"></div></section>
  <main class="scroll">
    <section class="tab active" id="tab-input">
      <div class="card"><div class="seg"><button class="active" data-input-type="actual">実施</button><button data-input-type="plan">予定</button></div><label class="label">日付</label><input class="date" type="date" id="inputDate"><label class="label">作業内容</label><textarea id="rawText" placeholder="例：牡丹に水やり。西側を除草。次回は薬剤A、次々回は薬剤Bで消毒予定。"></textarea><button class="primary" id="analyzeBtn">入力内容を整理する</button></div>
      <div class="card preview" id="preview"><div class="entry-head"><b>この内容で登録</b><button class="secondary" id="addEntryBtn">＋追加</button></div><div id="previewList"></div><button class="primary" id="saveBtn">登録する</button></div>
    </section>
    <section class="tab" id="tab-logs"><div class="viewbar"><button class="active" data-view="day">日</button><button data-view="week">週</button><button data-view="month">月</button></div><div class="period"><button id="prevPeriod">‹</button><b id="periodLabel"></b><button id="nextPeriod">›</button></div><div id="logsList"></div></section>
    <section class="tab" id="tab-plans"><div class="viewbar" id="planFilters"><button class="active" data-plan-filter="pending">未完了</button><button data-plan-filter="overdue">期限超過</button><button data-plan-filter="undated">日付未定</button><button data-plan-filter="done">完了</button></div><div id="plansList"></div></section>
  </main>
  <nav class="nav"><button class="active" data-tab="input"><span>✎</span>入力</button><button data-tab="logs"><span>☷</span>ログ</button><button data-tab="plans"><span>▣</span>予定</button></nav>
</div>
<div class="toast" id="toast"></div>
<div class="overlay" id="modal"><div class="modal"><div class="modal-head"><h2 id="modalTitle">編集</h2><button class="close" id="closeModal">×</button></div><div id="modalBody"></div></div></div>
<script>
const API_URL='/api';
const state={inputType:'actual',entries:[],actuals:[],plans:[],pinned:{},weather:null,masters:{},spreadsheetUrl:'',view:'day',cursor:new Date(),planFilter:'pending',busy:false};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const localDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtDate=s=>s?new Date(`${s}T12:00:00`).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'}):'日付未定';
$('#inputDate').value=localDate(new Date());
async function api(payload){const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let j;try{j=await r.json()}catch(e){throw new Error('APIから正しい応答が返りませんでした。')}if(!r.ok||!j.ok)throw new Error(j.error||'通信に失敗しました。');return j.data}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),2600)}
function busy(v,label){state.busy=v;$('#analyzeBtn').disabled=v;$('#saveBtn').disabled=v;$('#syncBtn').disabled=v;if(label)toast(label)}
async function bootstrap(){busy(true);try{const d=await api({action:'bootstrap'});applyBootstrap(d);toast('更新しました');}catch(e){toast(e.message)}finally{busy(false)}}
function applyBootstrap(d){state.actuals=d.actuals||[];state.plans=d.plans||[];state.pinned=d.pinned||{};state.weather=d.weather;state.masters=d.masters||{};state.spreadsheetUrl=d.spreadsheetUrl||'';renderPinned();renderLogs();renderPlans()}
function renderPinned(){const p=state.pinned||{}, card=(label,x)=>`<div class="pin-card"><small>${label}</small><b>${x?esc(x.action):'未登録'}</b><span>${x?esc(x.date?fmtDate(x.date):(x.seasonText||'日付未定')):''}</span></div>`;$('#pinRow').innerHTML=card('次回消毒',p.next)+card('次々回消毒',p.afterNext);$('#pinMore').innerHTML=(p.others||[]).map(x=>`<span class="mini-plan">${esc(x.date?fmtDate(x.date):(x.seasonText||'未定'))}　${esc(x.action)}</span>`).join('')||'<span class="mini-plan">その他の予定はありません</span>';$('#overdue').innerHTML=p.overdueCount?`<span class="overdue">期限超過 ${p.overdueCount}件</span>`:'';const w=state.weather;$('#weather').textContent=w?`${w.am||w.pm||'天気'}　最高 ${w.maxTemp??'—'}℃／最低 ${w.minTemp??'—'}℃　降水 ${w.rain??'—'}mm`:'今日の天気データはまだありません'}
$$('[data-input-type]').forEach(b=>b.onclick=()=>{$$('[data-input-type]').forEach(x=>x.classList.toggle('active',x===b));state.inputType=b.dataset.inputType;$('#rawText').placeholder=state.inputType==='actual'?'例：牡丹に水やり。西側を除草。':'例：次回は薬剤A、次々回は薬剤Bで消毒。来週は追肥。'});
$('#analyzeBtn').onclick=async()=>{const text=$('#rawText').value.trim();if(!text)return toast('入力内容がありません');busy(true,'整理中…');try{state.entries=await api({action:'analyze',text,inputType:state.inputType,date:$('#inputDate').value});renderPreview();if(state.entries.some(x=>x.localOnly))toast('APIキー未設定のため簡易整理しました');}catch(e){toast(e.message)}finally{busy(false)}};
function emptyEntry(){return{clientId:crypto.randomUUID(),type:state.inputType,date:$('#inputDate').value,seasonText:'',planOrder:'通常',plantName:'',place:'',category:'その他',action:'',quantity:'',material:'',dilution:'',observation:'',memo:''}}
function options(arr,value){return['',...(arr||[])].map(v=>`<option ${v===value?'selected':''}>${esc(v)}</option>`).join('')}
function renderPreview(){const wrap=$('#preview');wrap.classList.toggle('show',state.entries.length>0);$('#previewList').innerHTML=state.entries.map((e,i)=>`<div class="entry" data-i="${i}"><div class="entry-head"><span class="badge ${e.type==='plan'?'plan':''}">${e.type==='plan'?'予定':'実施'}</span><button class="danger" data-remove="${i}">削除</button></div><div class="grid2"><div><label class="label">区分</label><select data-f="type"><option value="actual" ${e.type==='actual'?'selected':''}>実施</option><option value="plan" ${e.type==='plan'?'selected':''}>予定</option></select></div><div><label class="label">日付</label><input type="date" data-f="date" value="${esc(e.date)}"></div></div>${e.type==='plan'?`<div class="grid2"><div><label class="label">時期表示</label><input data-f="seasonText" value="${esc(e.seasonText)}" placeholder="7月下旬・日付未定など"></div><div><label class="label">予定順</label><select data-f="planOrder">${['通常','次回','次々回','以降'].map(v=>`<option ${v===e.planOrder?'selected':''}>${v}</option>`).join('')}</select></div></div>`:''}<div class="grid2"><div><label class="label">対象植物</label><input list="plants" data-f="plantName" value="${esc(e.plantName)}"></div><div><label class="label">場所・区画</label><input list="places" data-f="place" value="${esc(e.place)}"></div></div><label class="label">作業分類</label><select data-f="category">${options(state.masters.categories,e.category)}</select><label class="label">作業内容</label><textarea data-f="action">${esc(e.action)}</textarea><div class="grid2"><div><label class="label">数量・範囲</label><input data-f="quantity" value="${esc(e.quantity)}"></div><div><label class="label">資材・薬剤</label><input list="materials" data-f="material" value="${esc(e.material)}"></div></div><label class="label">倍率・使用量</label><input data-f="dilution" value="${esc(e.dilution)}">${e.type==='actual'?`<label class="label">状態・観察内容</label><textarea data-f="observation">${esc(e.observation)}</textarea>`:''}<label class="label">備考</label><input data-f="memo" value="${esc(e.memo)}"></div>`).join('')+`<datalist id="plants">${(state.masters.plants||[]).map(v=>`<option value="${esc(v)}">`).join('')}</datalist><datalist id="places">${(state.masters.places||[]).map(v=>`<option value="${esc(v)}">`).join('')}</datalist><datalist id="materials">${(state.masters.materials||[]).map(v=>`<option value="${esc(v)}">`).join('')}</datalist>`;$$('#previewList .entry').forEach(el=>el.querySelectorAll('[data-f]').forEach(inp=>inp.oninput=()=>{state.entries[+el.dataset.i][inp.dataset.f]=inp.value;if(inp.dataset.f==='type')renderPreview()}));$$('[data-remove]').forEach(b=>b.onclick=()=>{state.entries.splice(+b.dataset.remove,1);renderPreview()})}
$('#addEntryBtn').onclick=()=>{state.entries.push(emptyEntry());renderPreview()};
$('#saveBtn').onclick=async()=>{if(!state.entries.length)return;for(const e of state.entries){if(!e.action.trim())return toast('作業内容を入力してください');if(e.type==='actual'&&!e.date)return toast('実施日を入力してください')}busy(true,'登録中…');try{const d=await api({action:'save',entries:state.entries,rawText:$('#rawText').value});applyBootstrap(d.bootstrap);state.entries=[];$('#rawText').value='';renderPreview();toast('登録しました')}catch(e){toast(e.message)}finally{busy(false)}};
function dateRange(){const d=new Date(state.cursor);if(state.view==='day'){const k=localDate(d);return{start:k,end:k,label:d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}}if(state.view==='week'){const day=d.getDay()||7,s=new Date(d);s.setDate(d.getDate()-day+1);const e=new Date(s);e.setDate(s.getDate()+6);return{start:localDate(s),end:localDate(e),label:`${fmtDate(localDate(s))}〜${fmtDate(localDate(e))}`}}const s=new Date(d.getFullYear(),d.getMonth(),1),e=new Date(d.getFullYear(),d.getMonth()+1,0);return{start:localDate(s),end:localDate(e),label:d.toLocaleDateString('ja-JP',{year:'numeric',month:'long'})}}
function renderLogs(){const r=dateRange();$('#periodLabel').textContent=r.label;const items=[...state.actuals,...state.plans].filter(x=>x.date&&x.date>=r.start&&x.date<=r.end).sort((a,b)=>(b.date||'').localeCompare(a.date||''));$('#logsList').innerHTML=items.length?items.map(logCard).join(''):'<div class="empty">この期間の記録はありません</div>';bindLogActions()}
function logCard(x){const details=[x.plantName,x.place,x.category,x.quantity,x.material,x.dilution].filter(Boolean).join('・');return`<div class="log-card"><div class="log-top"><div><span class="badge ${x.type==='plan'?'plan':''}">${x.type==='plan'?'予定':'実施'}</span><div class="log-title">${esc(x.action)}</div></div><span class="log-date">${fmtDate(x.date)}</span></div><div class="log-meta">${esc(details)}${x.observation?`<br>観察：${esc(x.observation)}`:''}${x.memo?`<br>備考：${esc(x.memo)}`:''}</div><div class="actions">${x.type==='plan'&&x.status!=='完了'?`<button data-complete="${x.id}">完了登録</button>`:''}<button data-edit="${x.type}:${x.id}">編集</button><button data-delete="${x.type}:${x.id}">削除</button></div></div>`}
function bindLogActions(){$$('[data-edit]').forEach(b=>b.onclick=()=>{const[t,id]=b.dataset.edit.split(':');openEdit(t,id)});$$('[data-delete]').forEach(b=>b.onclick=()=>{const[t,id]=b.dataset.delete.split(':');removeEntry(t,id)});$$('[data-complete]').forEach(b=>b.onclick=()=>openComplete(b.dataset.complete))}
$$('[data-view]').forEach(b=>b.onclick=()=>{$$('[data-view]').forEach(x=>x.classList.toggle('active',x===b));state.view=b.dataset.view;renderLogs()});
$('#prevPeriod').onclick=()=>movePeriod(-1);$('#nextPeriod').onclick=()=>movePeriod(1);function movePeriod(n){const d=state.cursor;if(state.view==='day')d.setDate(d.getDate()+n);else if(state.view==='week')d.setDate(d.getDate()+7*n);else d.setMonth(d.getMonth()+n);renderLogs()}
function renderPlans(){const today=localDate(new Date());let a=state.plans;if(state.planFilter==='pending')a=a.filter(x=>x.status!=='完了'&&x.status!=='中止');if(state.planFilter==='overdue')a=a.filter(x=>x.date&&x.date<today&&x.status!=='完了');if(state.planFilter==='undated')a=a.filter(x=>!x.date&&x.status!=='完了');if(state.planFilter==='done')a=a.filter(x=>x.status==='完了');$('#plansList').innerHTML=a.length?a.map(logCard).join(''):'<div class="empty">該当する予定はありません</div>';bindLogActions()}
$$('[data-plan-filter]').forEach(b=>b.onclick=()=>{$$('[data-plan-filter]').forEach(x=>x.classList.toggle('active',x===b));state.planFilter=b.dataset.planFilter;renderPlans()});
function openEdit(type,id){const x=(type==='plan'?state.plans:state.actuals).find(v=>v.id===id);if(!x)return;showModal('記録を編集',editForm(x,false),async()=>{const entry=readModalForm(type);try{const d=await api({action:'update',type,id,entry});applyBootstrap(d);hideModal();toast('更新しました')}catch(e){toast(e.message)}})}
function openComplete(id){const p=state.plans.find(x=>x.id===id);if(!p)return;const x={...p,type:'actual',date:localDate(new Date()),observation:''};showModal('予定を完了登録',editForm(x,true),async()=>{const entry=readModalForm('actual');try{const d=await api({action:'completePlan',id,entry});applyBootstrap(d);hideModal();toast('実施として登録しました')}catch(e){toast(e.message)}})}
function editForm(x,complete){return`<label class="label">日付</label><input id="mDate" type="date" value="${esc(x.date)}"><div class="grid2"><div><label class="label">対象植物</label><input id="mPlant" value="${esc(x.plantName)}"></div><div><label class="label">場所</label><input id="mPlace" value="${esc(x.place)}"></div></div><label class="label">分類</label><select id="mCategory">${options(state.masters.categories,x.category)}</select><label class="label">作業内容</label><textarea id="mAction">${esc(x.action)}</textarea><div class="grid2"><div><label class="label">数量・範囲</label><input id="mQuantity" value="${esc(x.quantity)}"></div><div><label class="label">資材・薬剤</label><input id="mMaterial" value="${esc(x.material)}"></div></div><label class="label">倍率・使用量</label><input id="mDilution" value="${esc(x.dilution)}">${x.type==='actual'||complete?`<label class="label">状態・観察内容</label><textarea id="mObservation">${esc(x.observation||'')}</textarea>`:`<div class="grid2"><div><label class="label">時期表示</label><input id="mSeason" value="${esc(x.seasonText)}"></div><div><label class="label">予定順</label><select id="mOrder">${['通常','次回','次々回','以降'].map(v=>`<option ${v===x.planOrder?'selected':''}>${v}</option>`).join('')}</select></div></div>`}<label class="label">備考</label><input id="mMemo" value="${esc(x.memo)}"><button class="primary" id="modalSave">${complete?'実施として登録':'更新する'}</button>`}
function readModalForm(type){return{type,date:$('#mDate').value,plantName:$('#mPlant').value,place:$('#mPlace').value,category:$('#mCategory').value,action:$('#mAction').value,quantity:$('#mQuantity').value,material:$('#mMaterial').value,dilution:$('#mDilution').value,observation:$('#mObservation')?.value||'',seasonText:$('#mSeason')?.value||'',planOrder:$('#mOrder')?.value||'通常',memo:$('#mMemo').value}}
async function removeEntry(type,id){if(!confirm('この記録を削除しますか？'))return;try{const d=await api({action:'delete',type,id});applyBootstrap(d);toast('削除しました')}catch(e){toast(e.message)}}
function showModal(title,html,onSave){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=html;$('#modal').classList.add('show');$('#modalSave').onclick=onSave}function hideModal(){$('#modal').classList.remove('show')}$('#closeModal').onclick=hideModal;$('#modal').onclick=e=>{if(e.target===$('#modal'))hideModal()};
$$('[data-tab]').forEach(b=>b.onclick=()=>{$$('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));$$('.tab').forEach(x=>x.classList.remove('active'));$(`#tab-${b.dataset.tab}`).classList.add('active');if(b.dataset.tab==='logs')renderLogs();if(b.dataset.tab==='plans')renderPlans()});
$('#pinToggle').onclick=()=>{const p=$('#pinned');p.classList.toggle('open');$('#pinToggle').textContent=p.classList.contains('open')?'閉じる':'展開'};$('#syncBtn').onclick=bootstrap;
bootstrap();
</script>
