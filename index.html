<body>
<div class="app">
  <header class="header"><h1>植物栽培管理日誌</h1><button class="sync" id="syncBtn">更新</button></header>
  <section class="pinned" id="pinned"><div class="pin-head"><div><div class="pin-title">予定 <span id="overdue"></span></div><div class="weather" id="weather">天気データを取得中</div><div class="weather-alert" id="weatherAlert"></div></div></div><div class="pin-title" style="margin-top:8px">消毒・液肥</div><div class="pin-row" id="pinRow"></div><div class="pin-title" style="margin-top:8px">作業</div><div class="pin-more" id="pinMore"></div></section>
  <main class="scroll">
    <section class="tab active" id="tab-today"><div id="todayList"></div></section>
    <section class="tab" id="tab-input">
      <div class="card"><div class="seg"><button class="active" data-input-type="actual">実施</button><button data-input-type="plan">予定</button></div><label class="label">日付</label><input class="date" type="date" id="inputDate"><label class="label">作業内容</label><textarea id="rawText" placeholder="例：牡丹に水やり。西側を除草。次回は薬剤A、次々回は薬剤Bで消毒予定。"></textarea><button class="primary" id="analyzeBtn">入力内容を整理する</button></div>
      <div class="card preview" id="preview"><div class="entry-head"><b>この内容で登録</b><button class="secondary" id="addEntryBtn">＋追加</button></div><div id="previewList"></div><button class="primary" id="saveBtn">登録する</button></div>
    </section>
    <section class="tab" id="tab-logs"><div class="viewbar"><button class="active" data-view="day">日</button><button data-view="week">週</button><button data-view="month">月</button></div><div class="card" style="padding:10px"><label class="label" style="margin-top:0">検索</label><input id="logSearch" placeholder="植物・場所・作業・資材・薬剤・液肥"><div class="grid2"><div><label class="label">開始日</label><input type="date" id="searchStart"></div><div><label class="label">終了日</label><input type="date" id="searchEnd"></div></div><div class="actions"><button id="searchClear">検索を解除</button></div></div><div class="grid2" style="margin-bottom:8px"><button class="secondary" id="usageBtn">資材・薬剤の使用履歴</button><button class="secondary" id="trashBtn">削除済みの記録</button></div><div class="period"><button id="prevPeriod">‹</button><b id="periodLabel"></b><button id="nextPeriod">›</button></div><div id="summaryCard"></div><div id="logsList"></div></section>
    <section class="tab" id="tab-plans"><div class="viewbar" id="planFilters"><button class="active" data-plan-filter="pending">未完了</button><button data-plan-filter="overdue">期限超過</button><button data-plan-filter="undated">日付未定</button><button data-plan-filter="done">完了</button><button data-plan-filter="cancelled">見送り</button></div><button class="secondary" id="calendarAllBtn" style="width:100%;margin-bottom:10px">未登録の予定をカレンダーへ一括登録</button><div id="plansList"></div></section>
  </main>
  <nav class="nav"><button class="active" data-tab="today"><span>✓</span>今日</button><button data-tab="input"><span>✎</span>入力</button><button data-tab="logs"><span>☷</span>ログ</button><button data-tab="plans"><span>▣</span>予定</button></nav>
</div>
<div class="toast" id="toast"></div>
<div class="processing" id="processing" aria-live="polite" aria-busy="true"><div class="processing-box"><span class="spinner"></span><span id="processingText">処理中…</span></div></div>
<div class="overlay" id="modal"><div class="modal"><div class="modal-head"><h2 id="modalTitle">編集</h2><button class="close" id="closeModal">×</button></div><div id="modalBody"></div></div></div>
<script>
const API_URL='/api';
const state={inputType:'actual',entries:[],actuals:[],plans:[],trash:[],pinned:{},summaries:{daily:[],weekly:[],monthly:[]},weather:null,masters:{},spreadsheetUrl:'',view:'day',cursor:new Date(),planFilter:'pending',search:{q:'',start:'',end:''},completingPlanId:'',rotationExpanded:false,busy:false};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const localDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtDate=s=>s?new Date(`${s}T12:00:00`).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'}):'日付未定';
$('#inputDate').value=localDate(new Date());
async function api(payload){const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let j;try{j=await r.json()}catch(e){throw new Error('APIから正しい応答が返りませんでした。')}if(!r.ok||!j.ok)throw new Error(j.error||'通信に失敗しました。');return j.data}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),2600)}
function busy(v,label){state.busy=v;$('#analyzeBtn').disabled=v;$('#saveBtn').disabled=v;$('#syncBtn').disabled=v;$('#processing').classList.toggle('show',v);if(v)$('#processingText').textContent=label||'処理中…'}
async function bootstrap(){busy(true);try{const d=await api({action:'bootstrap'});applyBootstrap(d);toast('更新しました');}catch(e){toast(e.message)}finally{busy(false)}}
function applyBootstrap(d){state.actuals=d.actuals||[];state.plans=d.plans||[];state.trash=d.trash||[];state.pinned=d.pinned||{};state.summaries=d.summaries||{daily:[],weekly:[],monthly:[]};state.weather=d.weather;state.masters=d.masters||{};state.spreadsheetUrl=d.spreadsheetUrl||'';renderPinned();renderToday();renderLogs();renderPlans()}
function renderPinned(){const p=state.pinned||{}, card=(label,x,kind)=>`<div class="pin-card"><small>${label}</small><b>${x?esc((kind==='liquid'?x.liquidFertilizer:x.pesticide)||x.action):'未登録'}</b><span>${x?esc([kind==='spray'&&x.sprayTarget,kind==='spray'&&x.targetPest,x.date?fmtDate(x.date):(x.seasonText||'')].filter(Boolean).join('・')):''}</span></div>`;$('#pinRow').innerHTML=card('次回 消毒',p.sprayNext,'spray')+card('次々回 消毒',p.sprayAfterNext,'spray')+card('次回 液肥',p.liquidNext,'liquid')+card('次々回 液肥',p.liquidAfterNext,'liquid');$('#pinMore').innerHTML=(p.workItems||[]).map(x=>`<span class="mini-plan">${esc(x.date?fmtDate(x.date):(x.startDate?`${fmtDate(x.startDate)}〜${fmtDate(x.endDate)}`:(x.seasonText||'未定')))}　${esc(x.action)}</span>`).join('')||'<span class="mini-plan">予定はありません</span>';$('#overdue').innerHTML=p.overdueCount?`<span class="overdue">期限超過 ${p.overdueCount}件</span>`:'';const w=state.weather,wt=w?(w.am&&w.pm&&w.am!==w.pm?`${w.am}→${w.pm}`:(w.am||w.pm||'天気')):'';$('#weather').textContent=w?`${wt}　最高 ${w.maxTemp??'—'}℃／最低 ${w.minTemp??'—'}℃　降水 ${w.rain??'—'}mm`:'今日の天気データはまだありません';const alerts=[];if(w){if((w.rain||0)>=1||/雨/.test(`${w.am||''}${w.pm||''}`))alerts.push('散布作業は降雨状況を確認');if((w.maxTemp||0)>=33)alerts.push('高温時間帯の作業に注意');if((w.wbgt||0)>=28)alerts.push(`暑さ指数 ${w.wbgt}：休憩・水分補給`);if((w.maxWind||0)>=8)alerts.push('強風時の散布を避ける')}$('#weatherAlert').textContent=alerts.join('／')}
function isRotationPlan(x){return x.type==='plan'&&x.rotationName&&Number(x.rotationOrder)>0}
function activeRotationPlans(){return state.plans.filter(x=>isRotationPlan(x)&&x.status!=='完了'&&x.status!=='中止')}
function rotationActuals(name){return state.actuals.filter(x=>x.rotationName===name).sort((a,b)=>(a.date||'').localeCompare(b.date||''))}
function rotationCard(){const items=activeRotationPlans();if(!items.length)return'';const current=items[0],next=items[1]||current,after=items[2]||next,total=Math.max(...items.map(x=>Number(x.rotationOrder)||0),12),count=Number(current.rotationOrder)||1,summary=x=>esc([x.category,x.action].filter(Boolean).join('：')),detail=[current.pesticide&&`薬剤：${current.pesticide}`,current.liquidFertilizer&&`液肥：${current.liquidFertilizer}`,current.dilution].filter(Boolean).join('・'),rows=items.slice(0,total);return`<div class="card rotation-card"><div class="rotation-head"><div><div class="pin-title">ダリア用ローテーション</div><div class="log-meta">実施すると自動で次の枠へ進みます</div></div><span class="rotation-count">${count} / ${total}</span></div><div class="rotation-current"><div class="rotation-label">今回</div><div class="rotation-action">${summary(current)}</div>${detail?`<div class="rotation-detail">${esc(detail)}</div>`:''}</div><div class="rotation-next"><div><div class="rotation-label">次回</div><b>${summary(next)}</b></div><div><div class="rotation-label">次々回</div><b>${summary(after)}</b></div></div><div class="rotation-actions"><button class="primary" data-rotation-run="${current.id}">実施する</button><button class="secondary" data-rotation-skip="${current.id}">次へ送る</button></div><button class="rotation-expand" data-rotation-expand>${state.rotationExpanded?'閉じる':'全12枠を見る'}</button>${state.rotationExpanded?`<div class="rotation-list">${rows.map((x,i)=>`<div class="rotation-row ${i===0?'current':''}"><span class="rotation-no">${i===0?'●':'○'} ${esc(x.rotationOrder)}</span><span class="rotation-kind">${esc(x.category)}</span><span>${esc(x.action)}</span></div>`).join('')}<div class="rotation-row"><span class="rotation-no">↻</span><span class="rotation-kind"></span><span>12番の次は1番へ戻る</span></div></div>`:''}</div>`}
function renderToday(){const today=localDate(new Date()),pending=state.plans.filter(x=>x.status!=='完了'&&x.status!=='中止'&&!isRotationPlan(x)),isToday=x=>x.date===today||x.startDate===today||(x.startDate&&x.endDate&&x.startDate<=today&&x.endDate>=today),isOverdue=x=>!isToday(x)&&((x.date&&x.date<today)||(x.endDate&&x.endDate<today)),sections=[['今日の予定',pending.filter(isToday)],['期限超過',pending.filter(isOverdue)],['日付未定',pending.filter(x=>!x.date&&!x.startDate)]];$('#todayList').innerHTML=rotationCard()+sections.map(([title,items])=>`<div class="pin-title" style="margin:4px 0 8px">${title}（${items.length}件）</div>${items.length?items.map(logCard).join(''):'<div class="empty" style="padding:16px 10px">該当する予定はありません</div>'}`).join('');bindLogActions()}
$$('[data-input-type]').forEach(b=>b.onclick=()=>{state.completingPlanId='';$$('[data-input-type]').forEach(x=>x.classList.toggle('active',x===b));state.inputType=b.dataset.inputType;$('#rawText').placeholder=state.inputType==='actual'?'例：牡丹に水やり。西側を除草。':'例：次回は薬剤A、次々回は薬剤Bで消毒。来週は追肥。'});
$('#analyzeBtn').onclick=async()=>{const text=$('#rawText').value.trim();if(!text)return toast('入力内容がありません');state.completingPlanId='';busy(true,'整理中…');try{state.entries=await api({action:'analyze',text,inputType:state.inputType,date:$('#inputDate').value});renderPreview();if(state.entries.some(x=>x.localOnly))toast('APIキー未設定のため簡易整理しました');}catch(e){toast(e.message)}finally{busy(false)}};
function emptyEntry(){return{clientId:crypto.randomUUID(),type:state.inputType,date:$('#inputDate').value,seasonText:'',planOrder:'通常',scheduleType:state.inputType==='plan'?'日付指定':'',startDate:'',endDate:'',rotationName:'',rotationOrder:0,cyclic:true,plantName:'',place:'',category:'その他',action:'',quantity:'',material:'',pesticide:'',liquidFertilizer:'',dilution:'',sprayTarget:'',targetPest:'',observation:'',memo:''}}
function options(arr,value){return['',...(arr||[])].map(v=>`<option ${v===value?'selected':''}>${esc(v)}</option>`).join('')}
function renderPreview(){
  const wrap=$('#preview');wrap.classList.toggle('show',state.entries.length>0);
  $('#addEntryBtn').style.display=state.completingPlanId?'none':'';
  $('#previewList').innerHTML=state.entries.map((e,i)=>`<div class="entry" data-i="${i}">

function openComplete(id,override){const p=override||state.plans.find(x=>x.id===id);if(!p)return;const today=localDate(new Date());state.completingPlanId=id;state.entries=[{...p,clientId:crypto.randomUUID(),type:'actual',date:today,observation:'',sourcePlanId:id}];state.inputType='actual';$('#inputDate').value=today;$('#rawText').value='';$$('[data-input-type]').forEach(b=>b.classList.toggle('active',b.dataset.inputType==='actual'));$('[data-tab="input"]').click();renderPreview();toast('実施内容を確認してください')}
function editForm(x,complete){return`<label class="label">日付</label><input id="mDate" type="date" value="${esc(x.date)}">${x.type==='plan'&&!complete?`<label class="label">予定形式</label><select id="mScheduleType">${['日付指定','期間指定','日付未定','ローテーション'].map(v=>`<option ${v===x.scheduleType?'selected':''}>${v}</option>`).join('')}</select><div class="grid2"><div><label class="label">開始日</label><input id="mStartDate" type="date" value="${esc(x.startDate)}"></div><div><label class="label">終了日</label><input id="mEndDate" type="date" value="${esc(x.endDate)}"></div></div>`:''}<div class="grid2"><div><label class="label">対象植物</label><input id="mPlant" value="${esc(x.plantName)}"></div><div><label class="label">場所</label><input id="mPlace" value="${esc(x.place)}"></div></div><label class="label">分類</label><select id="mCategory">${options(state.masters.categories,x.category)}</select><label class="label">作業内容</label><textarea id="mAction">${esc(x.action)}</textarea><div class="grid2"><div><label class="label">数量・範囲</label><input id="mQuantity" value="${esc(x.quantity)}"></div><div><label class="label">資材</label><input id="mMaterial" value="${esc(x.material)}"></div></div><div class="grid2"><div><label class="label">薬剤</label><input id="mPesticide" value="${esc(x.pesticide||'')}"></div><div><label class="label">液肥</label><input id="mLiquidFertilizer" value="${esc(x.liquidFertilizer||'')}"></div></div><label class="label">倍率・使用量</label><input id="mDilution" value="${esc(x.dilution)}"><div class="grid2"><div><label class="label">散布対象</label><input id="mSprayTarget" value="${esc(x.sprayTarget||'')}"></div><div><label class="label">対象病害虫</label><input id="mTargetPest" value="${esc(x.targetPest||'')}"></div></div>${x.type==='actual'||complete?`<label class="label">状態・観察内容</label><textarea id="mObservation">${esc(x.observation||'')}</textarea>`:`<label class="label">時期表示</label><input id="mSeason" value="${esc(x.seasonText)}"><div class="grid2"><div><label class="label">ローテーション名</label><input id="mRotationName" value="${esc(x.rotationName||'')}"></div><div><label class="label">順番</label><input id="mRotationOrder" type="number" value="${esc(x.rotationOrder||0)}"></div></div>`}<label class="label">備考</label><input id="mMemo" value="${esc(x.memo)}"><button class="primary" id="modalSave">${complete?'実施として登録':'更新する'}</button>`}
function readModalForm(type){return{type,date:$('#mDate').value,plantName:$('#mPlant').value,place:$('#mPlace').value,category:$('#mCategory').value,action:$('#mAction').value,quantity:$('#mQuantity').value,material:$('#mMaterial').value,pesticide:$('#mPesticide')?.value||'',liquidFertilizer:$('#mLiquidFertilizer')?.value||'',dilution:$('#mDilution').value,sprayTarget:$('#mSprayTarget')?.value||'',targetPest:$('#mTargetPest')?.value||'',observation:$('#mObservation')?.value||'',seasonText:$('#mSeason')?.value||'',planOrder:'通常',scheduleType:$('#mScheduleType')?.value||'日付指定',startDate:$('#mStartDate')?.value||'',endDate:$('#mEndDate')?.value||'',rotationName:$('#mRotationName')?.value||'',rotationOrder:Number($('#mRotationOrder')?.value)||0,cyclic:$('#mCyclic')?.checked!==false,memo:$('#mMemo').value}}
async function removeEntry(type,id){if(!confirm('この記録を削除しますか？'))return;busy(true,'削除中…');try{const d=await api({action:'delete',type,id});applyBootstrap(d);toast('削除しました')}catch(e){toast(e.message)}finally{busy(false)}}
$('#trashBtn').onclick=openTrash;
$('#usageBtn').onclick=openUsageHistory;
function openUsageHistory(){const map=new Map();state.actuals.forEach(x=>[['薬剤',x.pesticide],['液肥',x.liquidFertilizer],['資材',x.material]].forEach(([kind,value])=>{String(value||'').split(/[、,＋+／/\n]/).map(v=>v.trim()).filter(Boolean).forEach(name=>{const key=`${kind}:${name}`,r=map.get(key)||{kind,name,count:0,last:'',plants:new Set(),targets:new Set()};r.count++;if((x.date||'')>r.last)r.last=x.date||'';if(x.plantName)r.plants.add(x.plantName);if(x.sprayTarget)r.targets.add(x.sprayTarget);map.set(key,r)})}));const rows=[...map.values()].sort((a,b)=>b.last.localeCompare(a.last)||a.kind.localeCompare(b.kind));const html=rows.length?rows.map(r=>`<div class="log-card"><div class="log-top"><div><span class="badge">${esc(r.kind)}</span><div class="log-title">${esc(r.name)}</div></div><span class="log-date">最終 ${esc(fmtDate(r.last))}</span></div><div class="log-meta">使用 ${r.count}回${r.plants.size?`<br>対象：${esc([...r.plants].join('、'))}`:''}${r.targets.size?`<br>散布対象：${esc([...r.targets].join('、'))}`:''}</div></div>`).join(''):'<div class="empty">使用履歴はありません</div>';showModal('資材・薬剤の使用履歴',html)}
function openTrash(){const html=state.trash.length?state.trash.map(x=>`<div class="log-card"><div class="log-top"><div><span class="badge ${x.type==='plan'?'plan':''}">${x.type==='plan'?'予定':'実施'}</span><div class="log-title">${esc(x.action)}</div></div><span class="log-date">${esc(x.date?fmtDate(x.date):(x.seasonText||'日付未定'))}</span></div><div class="log-meta">${esc([x.plantName,x.place,x.category,x.memo].filter(Boolean).join('・'))}</div><div class="actions"><button data-restore="${x.type}:${x.id}">復元する</button></div></div>`).join(''):'<div class="empty">削除済みの記録はありません</div>';showModal('削除済みの記録',html);$$('[data-restore]').forEach(b=>b.onclick=()=>{const[t,id]=b.dataset.restore.split(':');restoreEntry(t,id)})}
async function restoreEntry(type,id){if(!confirm('この記録を復元しますか？'))return;busy(true,'復元中…');try{const d=await api({action:'restore',type,id});applyBootstrap(d);openTrash();toast('復元しました')}catch(e){toast(e.message)}finally{busy(false)}}
function showModal(title,html,onSave){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=html;$('#modal').classList.add('show');const save=$('#modalSave');if(save&&onSave)save.onclick=onSave}function hideModal(){$('#modal').classList.remove('show')}$('#closeModal').onclick=hideModal;$('#modal').onclick=e=>{if(e.target===$('#modal'))hideModal()};
$$('[data-tab]').forEach(b=>b.onclick=()=>{$$('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));$$('.tab').forEach(x=>x.classList.remove('active'));$(`#tab-${b.dataset.tab}`).classList.add('active');if(b.dataset.tab==='today')renderToday();if(b.dataset.tab==='logs')renderLogs();if(b.dataset.tab==='plans')renderPlans()});
$('#syncBtn').onclick=bootstrap;
bootstrap();
</script>
</body>
</html>
