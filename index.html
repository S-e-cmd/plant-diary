<body>
<div class="app">
  <header class="header"><h1>植物栽培管理日誌</h1><button class="sync" id="syncBtn">更新</button></header>
  <section class="pinned" id="pinned"><div class="pin-head"><div><div class="pin-title">今日の情報 <span id="overdue"></span></div><div class="weather" id="weather">天気データを取得中</div><div class="tomorrow-weather" id="tomorrowWeather">明日の予報を取得中</div><div class="weather-alert" id="weatherAlert"></div><div class="work-window" id="workWindow">作業可能時間を確認中</div><button class="weather-rule-btn" id="weatherRuleBtn">雨・風の判定基準</button><div class="week-forecast" id="weekForecast"></div></div><button class="pin-toggle" id="pinnedToggle" aria-label="固定欄の詳細を切り替え"></button></div><div class="pin-title" style="margin-top:8px">次回の消毒・液肥</div><div class="pin-row" id="pinRow"></div><div class="pin-title" style="margin-top:8px">今日の作業</div><div class="pin-more" id="pinMore"></div></section>
  <main class="scroll">
    <section class="tab active" id="tab-today"><div class="card outlook-card"><div class="outlook-head"><div class="pin-title">予定の見通し</div><div class="outlook-seg"><button class="active" data-outlook="7">7日</button><button data-outlook="14">14日</button><button data-outlook="30">30日</button></div></div><div id="outlookList"></div></div><div id="todayList"></div></section>
    <section class="tab" id="tab-input">
      <div class="card quick-card" id="quickInputCard"><div class="quick-head"><div class="pin-title">クイック入力</div><div class="quick-head-right"><span class="log-meta">タップして確認画面へ</span><button class="quick-manage" id="quickManageBtn">管理</button></div></div><div class="quick-groups" id="quickInputList"></div></div>
      <div class="card"><div class="seg"><button class="active" data-input-type="actual">実施</button><button data-input-type="plan">予定</button></div><label class="label">日付</label><input class="date" type="date" id="inputDate"><label class="label">作業内容</label><textarea id="rawText" placeholder="例：牡丹に水やり。西側を除草。次回は薬剤A、次々回は薬剤Bで消毒予定。"></textarea><div class="draft-note" id="draftNote">入力内容はこの端末に自動保存されます</div><button class="primary" id="analyzeBtn">入力内容を整理する</button></div>

<script>
const API_URL='/api';

const state={inputType:savedDraft?.inputType||'actual',entries:savedDraft?.entries||[],actuals:[],plans:[],trash:[],pinned:{},summaries:{daily:[],weekly:[],monthly:[]},weather:null,forecasts:[],forecastHourly:[],weatherRules:{spray:{rain:0.5,rainProbability:40,wind:5},liquid:{rain:0.5,rainProbability:40,wind:5}},masters:{},spreadsheetUrl:'',view:'day',cursor:new Date(),planFilter:'pending',search:{q:'',start:'',end:'',type:'',status:'',category:'',special:''},completingPlanId:'',rotationExpanded:false,busy:false,collapsed:savedCollapsed,selectionMode:false,selectedPlans:new Set(),visibleLogs:[],quickFavorites:savedQuickFavorites,quickMap:new Map(),logPage:1,logPageSize:20,logSort:'desc',outlookDays:7,expandedLogs:new Set(),savedSearches,intervalRules:[],analysis:null,settingsLoaded:false};

$('#rawText').value=savedDraft?.rawText||'';
async function api(payload){const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let j;try{j=await r.json()}catch(e){throw new Error('APIから正しい応答が返りませんでした。')}if(!r.ok||!j.ok)throw new Error(j.error||'通信に失敗しました。');return j.data}

function busy(v,label){state.busy=v;$('#analyzeBtn').disabled=v;$('#saveBtn').disabled=v;$('#syncBtn').disabled=v;$('#processing').classList.toggle('show',v);if(v)$('#processingText').textContent=label||'処理中…'}
async function bootstrap(){busy(true);try{const d=await api({action:'bootstrap'});state.forecasts=Array.isArray(d.forecasts)&&d.forecasts.length?d.forecasts:await fetchForecastsDirect();applyBootstrap(d);toast('更新しました');}catch(e){toast(e.message)}finally{busy(false)}}
async function fetchForecastsDirect(){try{const url='https://api.open-meteo.com/v1/forecast?latitude=35.7156&longitude=139.7730&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max&timezone=Asia%2FTokyo&wind_speed_unit=ms&forecast_days=7',r=await fetch(url),j=await r.json(),d=j.daily||{};return(d.time||[]).map((date,i)=>({date,code:Number(d.weather_code?.[i]),maxTemp:d.temperature_2m_max?.[i],minTemp:d.temperature_2m_min?.[i],rain:d.precipitation_sum?.[i],rainProbability:d.precipitation_probability_max?.[i],maxWind:d.wind_speed_10m_max?.[i],source:'browser-api'}))}catch(e){return[]}}
function forecastWeatherName(value){const code=typeof value==='object'?value?.code:value,weather=typeof value==='object'?value?.weather:'';if(weather)return weather;if(code===0)return'晴れ';if([1,2].includes(code))return'晴れ時々曇り';if(code===3)return'曇り';if([45,48].includes(code))return'霧';if(code>=51&&code<=67)return'雨';if(code>=71&&code<=77)return'雪';if(code>=80&&code<=82)return'にわか雨';if(code>=85&&code<=86)return'にわか雪';if(code>=95)return'雷雨';return'天気不明'}
function weatherRule(kind='spray'){return state.weatherRules[kind]||state.weatherRules.spray}
function forecastRain(f,kind='spray'){const r=weatherRule(kind);return!!f&&(Number(f.rain||0)>=Number(r.rain)||Number(f.rainProbability||0)>=Number(r.rainProbability)||/雨|雷|雪/.test(f.weather||'')||((f.code>=51&&f.code<=67)||(f.code>=80&&f.code<=82)||f.code>=95))}

function riskReason(f,kind='spray'){return[forecastRain(f,kind)?'雨':'',forecastStrongWind(f,kind)?`強風${Number(f.maxWind??f.wind).toFixed(1)}m/s`:'' ].filter(Boolean).join('・')}
function isWeatherSensitivePlan(x){return!!x&&(x.category==='消毒'||x.category==='液肥'||x.pesticide||x.liquidFertilizer)}
function planWeatherKind(x){return x&&(x.category==='液肥'||x.liquidFertilizer)&&!(x.category==='消毒'||x.pesticide)?'liquid':'spray'}
function safeWindows(date,kind){const rows=state.forecastHourly.filter(x=>String(x.datetime||'').slice(0,10)===date).filter(x=>{const h=new Date(x.datetime).getHours();return h>=6&&h<=18&&!weatherWorkRisk(x,kind)});if(!rows.length)return'候補なし';const hours=rows.map(x=>new Date(x.datetime).getHours()).sort((a,b)=>a-b),groups=[];hours.forEach(h=>{const g=groups.at(-1);if(g&&h<=g[1]+3)g[1]=h;else groups.push([h,h])});return groups.map(g=>`${g[0]}〜${Math.min(g[1]+3,21)}時`).join('、')}
function renderWorkWindows(){const today=localDate(new Date()),tomorrow=localDate(new Date(Date.now()+86400000)),line=(date,label,extra)=>`<div class="${extra?'window-extra':''}"><b>${label}</b>　消毒 ${safeWindows(date,'spray')}／液肥 ${safeWindows(date,'liquid')}</div>`;$('#workWindow').innerHTML=state.forecastHourly.length?line(today,'今日',false)+line(tomorrow,'明日',true):'時間別予報を取得できませんでした'}
function renderForecasts(){const f=state.forecasts[1],el=$('#tomorrowWeather');if(!f){el.textContent='明日の予報を取得できませんでした';el.classList.remove('rain');$('#weekForecast').innerHTML='';return}const rainText=f.rainProbability==null&&f.rain==null?'':`　降水 ${f.rainProbability??'—'}％・${f.rain??'—'}mm`,windText=f.maxWind==null?'':`　風 ${Number(f.maxWind).toFixed(1)}m/s`;el.textContent=`明日：${forecastWeatherName(f)}　最高 ${f.maxTemp??'—'}℃／最低 ${f.minTemp??'—'}℃${rainText}${windText}`;el.classList.toggle('rain',weatherWorkRisk(f));$('#weekForecast').innerHTML=state.forecasts.slice(1).map((x,i)=>`<div class="forecast-chip ${weatherWorkRisk(x)?'rain':''}"><b>${i===0?'明日':fmtDate(x.date)}</b>${esc(forecastWeatherName(x))}<br>${x.maxTemp??'—'}℃${x.maxWind==null?'':`・風${Number(x.maxWind).toFixed(1)}`}</div>`).join('');const alerts=[];if(weatherWorkRisk(f))alerts.push(`明日は${riskReason(f)}予報です。消毒・液肥は見送りを検討`);const byDate=new Map(state.forecasts.map(x=>[x.date,x])),risky=state.plans.filter(x=>x.status!=='完了'&&x.status!=='中止'&&isWeatherSensitivePlan(x)).filter(x=>{const d=x.date||x.startDate;return weatherWorkRisk(byDate.get(d),planWeatherKind(x))}).slice(0,2);risky.forEach(x=>{const d=x.date||x.startDate,k=planWeatherKind(x);alerts.push(`${fmtDate(d)}「${x.action}」は${riskReason(byDate.get(d),k)}予報`)});$('#weatherAlert').textContent=[$('#weatherAlert').textContent,...alerts].filter(Boolean).join('／')}
function applyBootstrap(d){state.actuals=d.actuals||[];state.plans=d.plans||[];state.trash=d.trash||[];state.pinned=d.pinned||{};state.summaries=d.summaries||{daily:[],weekly:[],monthly:[]};state.weather=d.weather;state.forecastHourly=d.forecastHourly||[];state.masters=d.masters||{};state.spreadsheetUrl=d.spreadsheetUrl||'';state.intervalRules=d.intervalRules||[];state.analysis=d.analysis||null;if(!state.settingsLoaded){const s=d.appSettings||{},needsUpload=!Object.keys(s).length;if(Array.isArray(s.quickFavorites)&&s.quickFavorites.length)state.quickFavorites=s.quickFavorites;if(Array.isArray(s.savedSearches)&&s.savedSearches.length)state.savedSearches=s.savedSearches;if(s.weatherRules)state.weatherRules={...state.weatherRules,...s.weatherRules};if(s.ui){state.outlookDays=Number(s.ui.outlookDays)||7;state.logSort=s.ui.logSort||'desc';$('#logSort').value=state.logSort}state.settingsLoaded=true;if(needsUpload)syncAppSettings()}state.selectedPlans=new Set([...state.selectedPlans].filter(id=>state.plans.some(x=>x.id===id)));fillLogFilters();renderPinned();renderForecasts();renderWorkWindows();renderOutlook();renderToday();renderLogs();renderPlans();renderQuickInputs();renderSavedSearches();if(state.entries.length)renderPreview()}
function fillLogFilters(){const el=$('#filterCategory'),value=el.value,cats=[...new Set([...state.actuals,...state.plans].map(x=>x.category).filter(Boolean))].sort();el.innerHTML='<option value="">分類すべて</option>'+cats.map(x=>`<option ${x===value?'selected':''}>${esc(x)}</option>`).join('')}
function quickKey(x){return[x.action,x.plantName,x.place,x.category,x.material,x.pesticide,x.liquidFertilizer,x.dilution,x.sprayTarget,x.targetPest].map(v=>String(v||'').trim()).join('|')}
function quickTemplate(x){return{qid:x.qid||crypto.randomUUID(),plantName:x.plantName||'',place:x.place||'',category:x.category||'その他',action:x.action||'',quantity:x.quantity||'',material:x.material||'',pesticide:x.pesticide||'',liquidFertilizer:x.liquidFertilizer||'',dilution:x.dilution||'',sprayTarget:x.sprayTarget||'',targetPest:x.targetPest||'',memo:x.memo||''}}
function isFavorite(x){const k=quickKey(x);return state.quickFavorites.some(v=>quickKey(v)===k)}
function saveQuickFavorites(){localStorage.setItem('plantDiaryQuickFavorites',JSON.stringify(state.quickFavorites));syncAppSettings()}
function syncAppSettings(){if(!state.settingsLoaded)return;clearTimeout(syncAppSettings.timer);syncAppSettings.timer=setTimeout(()=>api({action:'saveAppSettings',settings:{quickFavorites:state.quickFavorites,savedSearches:state.savedSearches,weatherRules:state.weatherRules,ui:{outlookDays:state.outlookDays,logSort:state.logSort}}}).catch(()=>{}),700)}
function saveDraft(){const has=$('#rawText').value.trim()||state.entries.length;if(has){localStorage.setItem('plantDiaryInputDraft',JSON.stringify({inputType:state.inputType,date:$('#inputDate').value,rawText:$('#rawText').value,entries:state.entries}));$('#draftNote').textContent='下書きを保存しました'}else{localStorage.removeItem('plantDiaryInputDraft');$('#draftNote').textContent='入力内容はこの端末に自動保存されます'}}
function clearDraft(){localStorage.removeItem('plantDiaryInputDraft');$('#draftNote').textContent='入力内容はこの端末に自動保存されます'}
function renderQuickInputs(){state.quickMap=new Map();const fav=state.quickFavorites.filter(x=>x.action),seen=new Set(fav.map(quickKey)),recent=[...state.actuals].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).filter(x=>{const k=quickKey(x);if(!x.action||seen.has(k))return false;seen.add(k);return true}).slice(0,8),group=(label,items)=>items.length?`<div class="quick-label">${label}</div><div class="quick-list">${items.map(x=>{const id=x.qid||`recent:${x.id}`;state.quickMap.set(id,x);return`<button class="quick-chip ${label==='お気に入り'?'favorite-on':''}" data-quick-use="${esc(id)}"><b>${esc(x.action)}</b><span>${esc([x.plantName,x.place,x.pesticide||x.liquidFertilizer||x.material].filter(Boolean).join('・')||'内容を確認')}</span></button>`}).join('')}</div>`:'';$('#quickInputList').innerHTML=group('お気に入り',fav)+group('最近使った内容',recent)||'<div class="quick-empty">実施記録を登録すると、最近使った内容が表示されます</div>';$$('[data-quick-use]').forEach(b=>b.onclick=()=>useQuick(state.quickMap.get(b.dataset.quickUse)))}
function useQuick(x){if(!x)return;const today=localDate(new Date()),q=quickTemplate(x);state.completingPlanId='';state.entries=[{...q,clientId:crypto.randomUUID(),type:'actual',date:today,seasonText:'',planOrder:'通常',scheduleType:'',startDate:'',endDate:'',rotationName:'',rotationOrder:0,cyclic:true,observation:''}];state.inputType='actual';$('#inputDate').value=today;$('#rawText').value='';$$('[data-input-type]').forEach(b=>b.classList.toggle('active',b.dataset.inputType==='actual'));renderPreview();saveDraft();toast('クイック入力を確認画面へ入れました')}
function toggleFavorite(type,id){const x=(type==='plan'?state.plans:state.actuals).find(v=>v.id===id);if(!x)return;const k=quickKey(x),i=state.quickFavorites.findIndex(v=>quickKey(v)===k);if(i>=0){state.quickFavorites.splice(i,1);toast('お気に入りから外しました')}else{state.quickFavorites.unshift(quickTemplate(x));toast('クイック入力へ追加しました')}saveQuickFavorites();renderQuickInputs();renderToday();renderLogs();renderPlans()}
function renderPinned(){const p=state.pinned||{},today=localDate(new Date()),todayWork=(p.workItems||[]).filter(x=>x.date===today||(x.startDate&&x.startDate<=today&&(!x.endDate||x.endDate>=today))),card=(label,x,kind)=>`<div class="pin-card"><small>${label}</small><b>${x?esc((kind==='liquid'?x.liquidFertilizer:x.pesticide)||x.action):'未登録'}</b><span>${x?esc([kind==='spray'&&x.sprayTarget,kind==='spray'&&x.targetPest,x.date?fmtDate(x.date):(x.seasonText||'')].filter(Boolean).join('・')):''}</span></div>`;$('#pinRow').innerHTML=card('次回 消毒',p.sprayNext,'spray')+card('次々回 消毒',p.sprayAfterNext,'spray')+card('次回 液肥',p.liquidNext,'liquid')+card('次々回 液肥',p.liquidAfterNext,'liquid');$('#pinMore').innerHTML=todayWork.map(x=>`<span class="mini-plan">${esc(x.date?fmtDate(x.date):(x.startDate?`${fmtDate(x.startDate)}〜${fmtDate(x.endDate)}`:(x.seasonText||'未定')))}　${esc(x.action)}</span>`).join('')||'<span class="today-work-empty">今日に該当する作業はありません</span>';$('#overdue').innerHTML=p.overdueCount?`<span class="overdue">期限超過 ${p.overdueCount}件</span>`:'';const w=state.weather,wt=w?(w.am&&w.pm&&w.am!==w.pm?`${w.am}→${w.pm}`:(w.am||w.pm||'天気')):'';$('#weather').textContent=w?`${wt}　最高 ${w.maxTemp??'—'}℃／最低 ${w.minTemp??'—'}℃　降水 ${w.rain??'—'}mm`:'今日の天気データはまだありません';const alerts=[];if(w){if((w.rain||0)>=1||/雨/.test(`${w.am||''}${w.pm||''}`))alerts.push('散布作業は降雨状況を確認');if((w.maxTemp||0)>=33)alerts.push('高温時間帯の作業に注意');if((w.wbgt||0)>=28)alerts.push(`暑さ指数 ${w.wbgt}：休憩・水分補給`);if((w.maxWind||0)>=8)alerts.push('強風時の散布を避ける')}$('#weatherAlert').textContent=alerts.join('／')}
function isRotationPlan(x){return x.type==='plan'&&x.rotationName&&Number(x.rotationOrder)>0}

$('#analysisBtn').onclick=()=>{const a=state.analysis;if(!a)return toast('分析データがありません');const list=(title,items)=>`<div class="summary-section"><b>${title}</b>${items.length?items.map(x=>`<div>${esc(x.name)}：${x.count}回</div>`).join(''):'<div>記録なし</div>'}</div>`;showModal('履歴分析',`<div class="summary-weather">${esc(a.month)}　実施 ${a.actualCount}件／未完了予定 ${a.pendingCount}件</div>${list('植物別',a.byPlant||[])}${list('分類別',a.byCategory||[])}<div class="summary-section"><b>最近使用した資材・薬剤</b>${(a.usage||[]).slice(0,12).map(x=>`<div>${esc(x.kind)}：${esc(x.name)}　${x.count}回（最終 ${esc(fmtDate(x.last))}）</div>`).join('')||'<div>記録なし</div>'}</div>`)};
function openUsageHistory(){const map=new Map();state.actuals.forEach(x=>[['薬剤',x.pesticide],['液肥',x.liquidFertilizer],['資材',x.material]].forEach(([kind,value])=>{String(value||'').split(/[、,＋+／/\n]/).map(v=>v.trim()).filter(Boolean).forEach(name=>{const key=`${kind}:${name}`,r=map.get(key)||{kind,name,count:0,last:'',plants:new Set(),targets:new Set()};r.count++;if((x.date||'')>r.last)r.last=x.date||'';if(x.plantName)r.plants.add(x.plantName);if(x.sprayTarget)r.targets.add(x.sprayTarget);map.set(key,r)})}));const rows=[...map.values()].sort((a,b)=>b.last.localeCompare(a.last)||a.kind.localeCompare(b.kind));const html=rows.length?rows.map(r=>`<div class="log-card"><div class="log-top"><div><span class="badge">${esc(r.kind)}</span><div class="log-title">${esc(r.name)}</div></div><span class="log-date">最終 ${esc(fmtDate(r.last))}</span></div><div class="log-meta">使用 ${r.count}回${r.plants.size?`<br>対象：${esc([...r.plants].join('、'))}`:''}${r.targets.size?`<br>散布対象：${esc([...r.targets].join('、'))}`:''}</div></div>`).join(''):'<div class="empty">使用履歴はありません</div>';showModal('資材・薬剤の使用履歴',html)}
function openTrash(){const html=state.trash.length?state.trash.map(x=>`<div class="log-card"><div class="log-top"><div><span class="badge ${x.type==='plan'?'plan':''}">${x.type==='plan'?'予定':'実施'}</span><div class="log-title">${esc(x.action)}</div></div><span class="log-date">${esc(x.date?fmtDate(x.date):(x.seasonText||'日付未定'))}</span></div><div class="log-meta">${esc([x.plantName,x.place,x.category,x.memo].filter(Boolean).join('・'))}</div><div class="actions"><button data-restore="${x.type}:${x.id}">復元する</button></div></div>`).join(''):'<div class="empty">削除済みの記録はありません</div>';showModal('削除済みの記録',html);$$('[data-restore]').forEach(b=>b.onclick=()=>{const[t,id]=b.dataset.restore.split(':');restoreEntry(t,id)})}
async function restoreEntry(type,id){if(!confirm('この記録を復元しますか？'))return;busy(true,'復元中…');try{const d=await api({action:'restore',type,id});applyBootstrap(d);openTrash();toast('復元しました')}catch(e){toast(e.message)}finally{busy(false)}}
function showModal(title,html,onSave){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=html;$('#modal').classList.add('show');const save=$('#modalSave');if(save&&onSave)save.onclick=onSave}function hideModal(){$('#modal').classList.remove('show')}$('#closeModal').onclick=hideModal;$('#modal').onclick=e=>{if(e.target===$('#modal'))hideModal()};
$$('[data-tab]').forEach(b=>b.onclick=()=>{$$('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));$$('.tab').forEach(x=>x.classList.remove('active'));$(`#tab-${b.dataset.tab}`).classList.add('active');localStorage.setItem('plantDiaryLastTab',b.dataset.tab);if(b.dataset.tab==='today')renderToday();if(b.dataset.tab==='logs')renderLogs();if(b.dataset.tab==='plans')renderPlans()});
$('#syncBtn').onclick=bootstrap;
$('#pinnedToggle').onclick=()=>$('#pinned').classList.toggle('open');
$('#weatherRuleBtn').onclick=()=>{const s=state.weatherRules.spray,l=state.weatherRules.liquid;showModal('雨・風の判定基準',`<div class="settings-note">基準値以上の予報を見送り候補として表示します。</div><div class="choice-group"><b>消毒</b><div class="grid2"><div><label class="label">時間降水量（mm）</label><input id="ruleSprayRain" type="number" min="0" step="0.1" value="${s.rain}"></div><div><label class="label">降水確率（％）</label><input id="ruleSprayProb" type="number" min="0" max="100" value="${s.rainProbability}"></div></div><label class="label">風速（m/s）</label><input id="ruleSprayWind" type="number" min="0" step="0.5" value="${s.wind}"></div><div class="choice-group"><b>液肥</b><div class="grid2"><div><label class="label">時間降水量（mm）</label><input id="ruleLiquidRain" type="number" min="0" step="0.1" value="${l.rain}"></div><div><label class="label">降水確率（％）</label><input id="ruleLiquidProb" type="number" min="0" max="100" value="${l.rainProbability}"></div></div><label class="label">風速（m/s）</label><input id="ruleLiquidWind" type="number" min="0" step="0.5" value="${l.wind}"></div><button class="primary" id="modalSave">保存する</button>`,()=>{state.weatherRules={spray:{rain:Number($('#ruleSprayRain').value),rainProbability:Number($('#ruleSprayProb').value),wind:Number($('#ruleSprayWind').value)},liquid:{rain:Number($('#ruleLiquidRain').value),rainProbability:Number($('#ruleLiquidProb').value),wind:Number($('#ruleLiquidWind').value)}};syncAppSettings();renderForecasts();renderWorkWindows();renderOutlook();hideModal();toast('判定基準を保存しました')})};
function updateSearchBadge(){const n=Object.values(state.search).filter(Boolean).length;$('#searchActiveCount').textContent=n?`（${n}条件）`:''}
$('#searchToggle').onclick=()=>$('#searchCard').classList.toggle('open');
['logSearch','searchStart','searchEnd','filterType','filterStatus','filterCategory','filterSpecial'].forEach(id=>{$(`#${id}`).addEventListener('input',updateSearchBadge);$(`#${id}`).addEventListener('change',updateSearchBadge)});
$('#searchClear').addEventListener('click',()=>setTimeout(updateSearchBadge));
function syncSearchInputs(){$('#logSearch').value=state.search.q;$('#searchStart').value=state.search.start;$('#searchEnd').value=state.search.end;$('#filterType').value=state.search.type;$('#filterStatus').value=state.search.status;$('#filterCategory').value=state.search.category;$('#filterSpecial').value=state.search.special;updateSearchBadge()}
function renderSavedSearches(){$('#savedSearches').innerHTML=state.savedSearches.map((x,i)=>`<span class="saved-search"><button data-search-load="${i}">${esc(x.name)}</button><button data-search-delete="${i}" aria-label="削除">×</button></span>`).join('');$$('[data-search-load]').forEach(b=>b.onclick=()=>{state.search={...state.savedSearches[+b.dataset.searchLoad].search};state.logPage=1;syncSearchInputs();renderLogs();toast('検索条件を呼び出しました')});$$('[data-search-delete]').forEach(b=>b.onclick=()=>{state.savedSearches.splice(+b.dataset.searchDelete,1);localStorage.setItem('plantDiarySavedSearches',JSON.stringify(state.savedSearches));renderSavedSearches();syncAppSettings()})}
$('#saveSearchBtn').onclick=()=>{if(!Object.values(state.search).some(Boolean))return toast('保存する検索条件がありません');const name=prompt('検索条件の名前を入力してください',state.search.q||state.search.category||'保存した検索');if(!name)return;state.savedSearches.push({name:name.trim(),search:{...state.search}});localStorage.setItem('plantDiarySavedSearches',JSON.stringify(state.savedSearches));renderSavedSearches();syncAppSettings();toast('検索条件を保存しました')};
$$('[data-outlook]').forEach(b=>b.onclick=()=>{$$('[data-outlook]').forEach(x=>x.classList.toggle('active',x===b));state.outlookDays=Number(b.dataset.outlook);renderOutlook();syncAppSettings()});
document.addEventListener('click',e=>{const b=e.target.closest('[data-favorite]');if(!b)return;const[t,id]=b.dataset.favorite.split(':');toggleFavorite(t,id)});
$('#rawText').addEventListener('input',saveDraft);$('#inputDate').addEventListener('change',saveDraft);
$('#quickManageBtn').onclick=()=>{const data=JSON.stringify(state.quickFavorites,null,2);showModal('クイック入力の管理',`<div class="settings-note">お気に入りはこの端末だけに保存されています。バックアップ文字列をコピーして、別端末で貼り付けることもできます。</div><label class="label">お気に入りデータ</label><textarea id="quickBackup" style="min-height:180px">${esc(data)}</textarea><div class="grid2"><button class="secondary" id="quickCopy">コピー</button><button class="secondary" id="quickImport">貼付内容を取り込む</button></div><button class="danger" id="quickClear" style="width:100%;margin-top:10px">お気に入りをすべて削除</button>`);$('#quickCopy').onclick=async()=>{try{await navigator.clipboard.writeText($('#quickBackup').value);toast('コピーしました')}catch(e){toast('文字列を選択してコピーしてください')}};$('#quickImport').onclick=()=>{try{const a=JSON.parse($('#quickBackup').value);if(!Array.isArray(a))throw 0;state.quickFavorites=a.map(quickTemplate);saveQuickFavorites();renderQuickInputs();hideModal();toast('お気に入りを取り込みました')}catch(e){toast('データ形式が正しくありません')}};$('#quickClear').onclick=()=>{if(confirm('お気に入りをすべて削除しますか？')){state.quickFavorites=[];saveQuickFavorites();renderQuickInputs();hideModal();toast('お気に入りを削除しました')}}};
const lastTab=localStorage.getItem('plantDiaryLastTab');if(['today','input','logs','plans'].includes(lastTab))$(`[data-tab="${lastTab}"]`).click();
if(savedDraft){$$('[data-input-type]').forEach(b=>b.classList.toggle('active',b.dataset.inputType===state.inputType));$('#draftNote').textContent='前回の下書きを復元しました'}
bootstrap();
</script>
</body>
</html>
