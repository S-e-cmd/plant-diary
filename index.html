<body>
<div class="app">
  <header class="header"><h1>植物栽培管理日誌</h1><button class="sync" id="syncBtn">更新</button></header>
  <section class="pinned" id="pinned"><div class="pin-head"><div><div class="pin-title">予定 <span id="overdue"></span></div><div class="weather" id="weather">天気データを取得中</div></div></div><div class="pin-title" style="margin-top:8px">消毒・液肥</div><div class="pin-row" id="pinRow"></div><div class="pin-title" style="margin-top:8px">作業</div><div class="pin-more" id="pinMore"></div></section>
  <main class="scroll">
    <section class="tab active" id="tab-today"><div id="todayList"></div></section>
    <section class="tab" id="tab-input">
      <div class="card"><div class="seg"><button class="active" data-input-type="actual">実施</button><button data-input-type="plan">予定</button></div><label class="label">日付</label><input class="date" type="date" id="inputDate"><label class="label">作業内容</label><textarea id="rawText" placeholder="例：牡丹に水やり。西側を除草。次回は薬剤A、次々回は薬剤Bで消毒予定。"></textarea><button class="primary" id="analyzeBtn">入力内容を整理する</button></div>
      <div class="card preview" id="preview"><div class="entry-head"><b>この内容で登録</b><button class="secondary" id="addEntryBtn">＋追加</button></div><div id="previewList"></div><button class="primary" id="saveBtn">登録する</button></div>
    </section>
    <section class="tab" id="tab-logs"><div class="viewbar"><button class="active" data-view="day">日</button><button data-view="week">週</button><button data-view="month">月</button></div><button class="secondary" id="trashBtn" style="width:100%;margin-bottom:8px">削除済みの記録</button><div class="period"><button id="prevPeriod">‹</button><b id="periodLabel"></b><button id="nextPeriod">›</button></div><div id="summaryCard"></div><div id="logsList"></div></section>
    <section class="tab" id="tab-plans"><div class="viewbar" id="planFilters"><button class="active" data-plan-filter="pending">未完了</button><button data-plan-filter="overdue">期限超過</button><button data-plan-filter="undated">日付未定</button><button data-plan-filter="done">完了</button></div><button class="secondary" id="calendarAllBtn" style="width:100%;margin-bottom:10px">未登録の予定をカレンダーへ一括登録</button><div id="plansList"></div></section>
  </main>
  <nav class="nav"><button class="active" data-tab="today"><span>✓</span>今日</button><button data-tab="input"><span>✎</span>入力</button><button data-tab="logs"><span>☷</span>ログ</button><button data-tab="plans"><span>▣</span>予定</button></nav>
</div>
<div class="toast" id="toast"></div>
<div class="overlay" id="modal"><div class="modal"><div class="modal-head"><h2 id="modalTitle">編集</h2><button class="close" id="closeModal">×</button></div><div id="modalBody"></div></div></div>
<script>
const API_URL='/api';
const state={inputType:'actual',entries:[],actuals:[],plans:[],trash:[],pinned:{},summaries:{daily:[],weekly:[],monthly:[]},weather:null,masters:{},spreadsheetUrl:'',view:'day',cursor:new Date(),planFilter:'pending',busy:false};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const localDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtDate=s=>s?new Date(`${s}T12:00:00`).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'}):'日付未定';
$('#inputDate').value=localDate(new Date());
async function api(payload){const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let j;try{j=await r.json()}catch(e){throw new Error('APIから正しい応答が返りませんでした。')}if(!r.ok||!j.ok)throw new Error(j.error||'通信に失敗しました。');return j.data}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),2600)}
function busy(v,label){state.busy=v;$('#analyzeBtn').disabled=v;$('#saveBtn').disabled=v;$('#syncBtn').disabled=v;if(label)toast(label)}
async function bootstrap(){busy(true);try{const d=await api({action:'bootstrap'});applyBootstrap(d);toast('更新しました');}catch(e){toast(e.message)}finally{busy(false)}}
function applyBootstrap(d){state.actuals=d.actuals||[];state.plans=d.plans||[];state.trash=d.trash||[];state.pinned=d.pinned||{};state.summaries=d.summaries||{daily:[],weekly:[],monthly:[]};state.weather=d.weather;state.masters=d.masters||{};state.spreadsheetUrl=d.spreadsheetUrl||'';renderPinned();renderToday();renderLogs();renderPlans()}
function renderPinned(){const p=state.pinned||{}, card=(label,x,kind)=>`<div class="pin-card"><small>${label}</small><b>${x?esc((kind==='liquid'?x.liquidFertilizer:x.pesticide)||x.action):'未登録'}</b><span>${x?esc([kind==='spray'&&x.sprayTarget,kind==='spray'&&x.targetPest,x.date?fmtDate(x.date):(x.seasonText||'')].filter(Boolean).join('・')):''}</span></div>`;$('#pinRow').innerHTML=card('次回 消毒',p.sprayNext,'spray')+card('次々回 消毒',p.sprayAfterNext,'spray')+card('次回 液肥',p.liquidNext,'liquid')+card('次々回 液肥',p.liquidAfterNext,'liquid');$('#pinMore').innerHTML=(p.workItems||[]).map(x=>`<span class="mini-plan">${esc(x.date?fmtDate(x.date):(x.startDate?`${fmtDate(x.startDate)}〜${fmtDate(x.endDate)}`:(x.seasonText||'未定')))}　${esc(x.action)}</span>`).join('')||'<span class="mini-plan">予定はありません</span>';$('#overdue').innerHTML=p.overdueCount?`<span class="overdue">期限超過 ${p.overdueCount}件</span>`:'';const w=state.weather,wt=w?(w.am&&w.pm&&w.am!==w.pm?`${w.am}→${w.pm}`:(w.am||w.pm||'天気')):'';$('#weather').textContent=w?`${wt}　最高 ${w.maxTemp??'—'}℃／最低 ${w.minTemp??'—'}℃　降水 ${w.rain??'—'}mm`:'今日の天気データはまだありません'}
function renderToday(){const today=localDate(new Date()),pending=state.plans.filter(x=>x.status!=='完了'&&x.status!=='中止'),isToday=x=>x.date===today||x.startDate===today||(x.startDate&&x.endDate&&x.startDate<=today&&x.endDate>=today),isOverdue=x=>!isToday(x)&&((x.date&&x.date<today)||(x.endDate&&x.endDate<today)),sections=[['今日の予定',pending.filter(isToday)],['期限超過',pending.filter(isOverdue)],['日付未定',pending.filter(x=>!x.date&&!x.startDate)]];$('#todayList').innerHTML=sections.map(([title,items])=>`<div class="pin-title" style="margin:4px 0 8px">${title}（${items.length}件）</div>${items.length?items.map(logCard).join(''):'<div class="empty" style="padding:16px 10px">該当する予定はありません</div>'}`).join('');bindLogActions()}
$$('[data-input-type]').forEach(b=>b.onclick=()=>{$$('[data-input-type]').forEach(x=>x.classList.toggle('active',x===b));state.inputType=b.dataset.inputType;$('#rawText').placeholder=state.inputType==='actual'?'例：牡丹に水やり。西側を除草。':'例：次回は薬剤A、次々回は薬剤Bで消毒。来週は追肥。'});
$('#analyzeBtn').onclick=async()=>{const text=$('#rawText').value.trim();if(!text)return toast('入力内容がありません');busy(true,'整理中…');try{state.entries=await api({action:'analyze',text,inputType:state.inputType,date:$('#inputDate').value});renderPreview();if(state.entries.some(x=>x.localOnly))toast('APIキー未設定のため簡易整理しました');}catch(e){toast(e.message)}finally{busy(false)}};
function emptyEntry(){return{clientId:crypto.randomUUID(),type:state.inputType,date:$('#inputDate').value,seasonText:'',planOrder:'通常',scheduleType:state.inputType==='plan'?'日付指定':'',startDate:'',endDate:'',rotationName:'',rotationOrder:0,cyclic:true,plantName:'',place:'',category:'その他',action:'',quantity:'',material:'',pesticide:'',liquidFertilizer:'',dilution:'',sprayTarget:'',targetPest:'',observation:'',memo:''}}
function options(arr,value){return['',...(arr||[])].map(v=>`<option ${v===value?'selected':''}>${esc(v)}</option>`).join('')}
function renderPreview(){
  const wrap=$('#preview');wrap.classList.toggle('show',state.entries.length>0);
  $('#previewList').innerHTML=state.entries.map((e,i)=>`<div class="entry" data-i="${i}">
    <div class="entry-head"><span class="badge ${e.type==='plan'?'plan':''}">${e.type==='plan'?'予定':'実施'}</span><button class="danger" data-remove="${i}">削除</button></div>
    <div class="grid2"><div><label class="label">区分</label><select data-f="type"><option value="actual" ${e.type==='actual'?'selected':''}>実施</option><option value="plan" ${e.type==='plan'?'selected':''}>予定</option></select></div><div><label class="label">日付</label><input type="date" data-f="date" value="${esc(e.date)}"></div></div>
    ${e.type==='plan'?`<label class="label">予定形式</label><select data-f="scheduleType">${['日付指定','期間指定','日付未定','ローテーション'].map(v=>`<option ${v===e.scheduleType?'selected':''}>${v}</option>`).join('')}</select><div class="grid2"><div><label class="label">開始日</label><input type="date" data-f="startDate" value="${esc(e.startDate)}"></div><div><label class="label">終了日</label><input type="date" data-f="endDate" value="${esc(e.endDate)}"></div></div><label class="label">時期表示</label><input data-f="seasonText" value="${esc(e.seasonText)}" placeholder="7月下旬など"><div class="grid2"><div><label class="label">ローテーション名</label><input data-f="rotationName" value="${esc(e.rotationName)}"></div><div><label class="label">順番</label><input type="number" min="0" data-f="rotationOrder" value="${esc(e.rotationOrder)}"></div></div>`:''}
    <div class="grid2"><div><label class="label">対象植物</label><input list="plants" data-f="plantName" value="${esc(e.plantName)}"></div><div><label class="label">場所・区画</label><input list="places" data-f="place" value="${esc(e.place)}"></div></div>
    <label class="label">作業分類</label><select data-f="category">${options(state.masters.categories,e.category)}</select><label class="label">作業内容</label><textarea data-f="action">${esc(e.action)}</textarea>
    <div class="grid2"><div><label class="label">数量・範囲</label><input data-f="quantity" value="${esc(e.quantity)}"></div><div><label class="label">資材</label><input list="materials" data-f="material" value="${esc(e.material)}"></div></div><div class="grid2"><div><label class="label">薬剤</label><input data-f="pesticide" value="${esc(e.pesticide||'')}"></div><div><label class="label">液肥</label><input data-f="liquidFertilizer" value="${esc(e.liquidFertilizer||'')}"></div></div>
    <label class="label">倍率・使用量</label><input data-f="dilution" value="${esc(e.dilution)}"><div class="grid2"><div><label class="label">散布対象</label><input data-f="sprayTarget" value="${esc(e.sprayTarget)}"></div><div><label class="label">対象病害虫</label><input data-f="targetPest" value="${esc(e.targetPest)}"></div></div>
    ${e.type==='actual'?`<label class="label">状態・観察内容</label><textarea data-f="observation">${esc(e.observation)}</textarea>`:''}<label class="label">備考</label><input data-f="memo" value="${esc(e.memo)}"></div>`).join('')+`<datalist id="plants">${(state.masters.plants||[]).map(v=>`<option value="${esc(v)}">`).join('')}</datalist><datalist id="places">${(state.masters.places||[]).map(v=>`<option value="${esc(v)}">`).join('')}</datalist><datalist id="materials">${(state.masters.materials||[]).map(v=>`<option value="${esc(v)}">`).join('')}</datalist>`;
  $$('#previewList .entry').forEach(el=>el.querySelectorAll('[data-f]').forEach(inp=>inp.oninput=()=>{state.entries[+el.dataset.i][inp.dataset.f]=inp.value;if(inp.dataset.f==='type')renderPreview()}));
  $$('[data-remove]').forEach(b=>b.onclick=()=>{state.entries.splice(+b.dataset.remove,1);renderPreview()});
}
$('#addEntryBtn').onclick=()=>{state.entries.push(emptyEntry());renderPreview()};
$('#saveBtn').onclick=async()=>{if(!state.entries.length)return;for(const e of state.entries){if(!e.action.trim())return toast('作業内容を入力してください');if(e.type==='actual'&&!e.date)return toast('実施日を入力してください')}busy(true,'確認中…');try{const check=await api({action:'checkDuplicates',entries:state.entries});let allowDuplicates=false;if(check.count){allowDuplicates=confirm(`同じ日付・作業・対象の記録が${check.count}件あります。それでも登録しますか？`);if(!allowDuplicates)return}const d=await api({action:'save',entries:state.entries,rawText:$('#rawText').value,allowDuplicates});applyBootstrap(d.bootstrap);state.entries=[];$('#rawText').value='';renderPreview();toast('登録しました')}catch(e){toast(e.message)}finally{busy(false)}};
function dateRange(){const d=new Date(state.cursor);if(state.view==='day'){const k=localDate(d);return{start:k,end:k,label:d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}}if(state.view==='week'){const day=d.getDay()||7,s=new Date(d);s.setDate(d.getDate()-day+1);const e=new Date(s);e.setDate(s.getDate()+6);return{start:localDate(s),end:localDate(e),label:`${fmtDate(localDate(s))}〜${fmtDate(localDate(e))}`}}const s=new Date(d.getFullYear(),d.getMonth(),1),e=new Date(d.getFullYear(),d.getMonth()+1,0);return{start:localDate(s),end:localDate(e),label:d.toLocaleDateString('ja-JP',{year:'numeric',month:'long'})}}
function renderLogs(){const r=dateRange();$('#periodLabel').textContent=r.label;renderSummary(r);const items=[...state.actuals,...state.plans].filter(x=>x.date&&x.date>=r.start&&x.date<=r.end).sort((a,b)=>(b.date||'').localeCompare(a.date||''));$('#logsList').innerHTML=items.length?items.map(logCard).join(''):'<div class="empty">この期間の記録はありません</div>';bindLogActions()}
function renderSummary(r){const list=state.view==='day'?state.summaries.daily:state.view==='week'?state.summaries.weekly:state.summaries.monthly,key=state.view==='month'?r.start.slice(0,7):r.start,s=(list||[]).find(x=>x.key===key);if(!s){$('#summaryCard').innerHTML='';return}const temp=[s.weather,s.maxTemp!=null&&`最高 ${s.maxTemp}℃`,s.minTemp!=null&&`最低 ${s.minTemp}℃`,s.rain!=null&&`降水 ${s.rain}mm`].filter(x=>x!==false&&x!==null&&x!=='').join('・');const detail=[`実施 ${s.actualCount||0}件`,s.planCount!=null&&`予定 ${s.planCount}件`,s.completedCount!=null&&`完了 ${s.completedCount}件`,s.pendingCount!=null&&`未完了 ${s.pendingCount}件`].filter(x=>x!==false).join('　');const texts=[s.actions&&`作業：${s.actions}`,s.plants&&`対象：${s.plants}`,s.categories&&`分類：${s.categories}`,s.materials&&`資材：${s.materials}`,s.observations&&`観察：${s.observations}`,s.pending&&`予定：${s.pending}`].filter(Boolean).map(esc).join('<br>');$('#summaryCard').innerHTML=`<div class="card"><div class="pin-title">${state.view==='day'?'デイリー':state.view==='week'?'ウィーク':'マンス'}サマリー</div><div class="log-title">${esc(temp||'天気データなし')}</div><div class="log-meta">${esc(detail)}${texts?`<br>${texts}`:''}</div></div>`}
function logCard(x){const period=x.scheduleType==='期間指定'&&x.startDate?`${fmtDate(x.startDate)}〜${fmtDate(x.endDate)}`:(x.date?fmtDate(x.date):(x.seasonText||'日付未定'));const details=[x.plantName,x.place,x.category,x.quantity,x.material&&`資材：${x.material}`,x.pesticide&&`薬剤：${x.pesticide}`,x.liquidFertilizer&&`液肥：${x.liquidFertilizer}`,x.dilution,x.sprayTarget&&`散布対象：${x.sprayTarget}`,x.targetPest&&`対象病害虫：${x.targetPest}`,x.rotationName&&`ローテーション：${x.rotationName}`].filter(Boolean).join('・');const cal=x.type==='plan'&&x.status!=='完了'?(x.calendarEventId?'<button disabled>カレンダー登録済み</button>':(x.date||x.startDate)?`<button data-calendar="${x.id}">カレンダー登録</button>`:''):'';return`<div class="log-card"><div class="log-top"><div><span class="badge ${x.type==='plan'?'plan':''}">${x.type==='plan'?'予定':'実施'}</span><div class="log-title">${esc(x.action)}</div></div><span class="log-date">${esc(period)}</span></div><div class="log-meta">${esc(details)}${x.observation?`<br>観察：${esc(x.observation)}`:''}${x.memo?`<br>備考：${esc(x.memo)}`:''}</div><div class="actions">${cal}${x.type==='plan'&&x.status!=='完了'?`<button data-complete="${x.id}">完了登録</button>`:''}<button data-edit="${x.type}:${x.id}">編集</button><button data-delete="${x.type}:${x.id}">削除</button></div></div>`}
function bindLogActions(){$$('[data-edit]').forEach(b=>b.onclick=()=>{const[t,id]=b.dataset.edit.split(':');openEdit(t,id)});$$('[data-delete]').forEach(b=>b.onclick=()=>{const[t,id]=b.dataset.delete.split(':');removeEntry(t,id)});$$('[data-complete]').forEach(b=>b.onclick=()=>openComplete(b.dataset.complete));$$('[data-calendar]').forEach(b=>b.onclick=()=>syncCalendar(b.dataset.calendar))}
$$('[data-view]').forEach(b=>b.onclick=()=>{$$('[data-view]').forEach(x=>x.classList.toggle('active',x===b));state.view=b.dataset.view;renderLogs()});
$('#prevPeriod').onclick=()=>movePeriod(-1);$('#nextPeriod').onclick=()=>movePeriod(1);function movePeriod(n){const d=state.cursor;if(state.view==='day')d.setDate(d.getDate()+n);else if(state.view==='week')d.setDate(d.getDate()+7*n);else d.setMonth(d.getMonth()+n);renderLogs()}
function renderPlans(){const today=localDate(new Date());let a=state.plans;if(state.planFilter==='pending')a=a.filter(x=>x.status!=='完了'&&x.status!=='中止');if(state.planFilter==='overdue')a=a.filter(x=>x.date&&x.date<today&&x.status!=='完了');if(state.planFilter==='undated')a=a.filter(x=>!x.date&&x.status!=='完了');if(state.planFilter==='done')a=a.filter(x=>x.status==='完了');$('#plansList').innerHTML=a.length?a.map(logCard).join(''):'<div class="empty">該当する予定はありません</div>';bindLogActions()}
async function syncCalendar(id){if(!confirm('この予定をGoogleカレンダーへ登録しますか？'))return;try{const d=await api({action:'syncPlanCalendar',id});applyBootstrap(d);toast('カレンダーへ登録しました')}catch(e){toast(e.message)}}
$('#calendarAllBtn').onclick=async()=>{const count=state.plans.filter(x=>x.status!=='完了'&&x.status!=='中止'&&!x.calendarEventId&&(x.date||x.startDate)).length;if(!count)return toast('登録できる未登録予定はありません');if(!confirm(`${count}件の予定をGoogleカレンダーへ登録しますか？`))return;try{const d=await api({action:'syncAllPlansCalendar'});applyBootstrap(d.bootstrap);toast(`${d.registered}件を登録しました`)}catch(e){toast(e.message)}};
$$('[data-plan-filter]').forEach(b=>b.onclick=()=>{$$('[data-plan-filter]').forEach(x=>x.classList.toggle('active',x===b));state.planFilter=b.dataset.planFilter;renderPlans()});
function openEdit(type,id){const x=(type==='plan'?state.plans:state.actuals).find(v=>v.id===id);if(!x)return;showModal('記録を編集',editForm(x,false),async()=>{const entry=readModalForm(type);try{const d=await api({action:'update',type,id,entry});applyBootstrap(d);hideModal();toast('更新しました')}catch(e){toast(e.message)}})}
function openComplete(id){const p=state.plans.find(x=>x.id===id);if(!p)return;const x={...p,type:'actual',date:localDate(new Date()),observation:''};showModal('予定を完了登録',editForm(x,true),async()=>{const entry=readModalForm('actual');try{const d=await api({action:'completePlan',id,entry});applyBootstrap(d);hideModal();toast('実施として登録しました')}catch(e){toast(e.message)}})}
function editForm(x,complete){return`<label class="label">日付</label><input id="mDate" type="date" value="${esc(x.date)}">${x.type==='plan'&&!complete?`<label class="label">予定形式</label><select id="mScheduleType">${['日付指定','期間指定','日付未定','ローテーション'].map(v=>`<option ${v===x.scheduleType?'selected':''}>${v}</option>`).join('')}</select><div class="grid2"><div><label class="label">開始日</label><input id="mStartDate" type="date" value="${esc(x.startDate)}"></div><div><label class="label">終了日</label><input id="mEndDate" type="date" value="${esc(x.endDate)}"></div></div>`:''}<div class="grid2"><div><label class="label">対象植物</label><input id="mPlant" value="${esc(x.plantName)}"></div><div><label class="label">場所</label><input id="mPlace" value="${esc(x.place)}"></div></div><label class="label">分類</label><select id="mCategory">${options(state.masters.categories,x.category)}</select><label class="label">作業内容</label><textarea id="mAction">${esc(x.action)}</textarea><div class="grid2"><div><label class="label">数量・範囲</label><input id="mQuantity" value="${esc(x.quantity)}"></div><div><label class="label">資材</label><input id="mMaterial" value="${esc(x.material)}"></div></div><div class="grid2"><div><label class="label">薬剤</label><input id="mPesticide" value="${esc(x.pesticide||'')}"></div><div><label class="label">液肥</label><input id="mLiquidFertilizer" value="${esc(x.liquidFertilizer||'')}"></div></div><label class="label">倍率・使用量</label><input id="mDilution" value="${esc(x.dilution)}"><div class="grid2"><div><label class="label">散布対象</label><input id="mSprayTarget" value="${esc(x.sprayTarget||'')}"></div><div><label class="label">対象病害虫</label><input id="mTargetPest" value="${esc(x.targetPest||'')}"></div></div>${x.type==='actual'||complete?`<label class="label">状態・観察内容</label><textarea id="mObservation">${esc(x.observation||'')}</textarea>`:`<label class="label">時期表示</label><input id="mSeason" value="${esc(x.seasonText)}"><div class="grid2"><div><label class="label">ローテーション名</label><input id="mRotationName" value="${esc(x.rotationName||'')}"></div><div><label class="label">順番</label><input id="mRotationOrder" type="number" value="${esc(x.rotationOrder||0)}"></div></div>`}<label class="label">備考</label><input id="mMemo" value="${esc(x.memo)}"><button class="primary" id="modalSave">${complete?'実施として登録':'更新する'}</button>`}
function readModalForm(type){return{type,date:$('#mDate').value,plantName:$('#mPlant').value,place:$('#mPlace').value,category:$('#mCategory').value,action:$('#mAction').value,quantity:$('#mQuantity').value,material:$('#mMaterial').value,pesticide:$('#mPesticide')?.value||'',liquidFertilizer:$('#mLiquidFertilizer')?.value||'',dilution:$('#mDilution').value,sprayTarget:$('#mSprayTarget')?.value||'',targetPest:$('#mTargetPest')?.value||'',observation:$('#mObservation')?.value||'',seasonText:$('#mSeason')?.value||'',planOrder:'通常',scheduleType:$('#mScheduleType')?.value||'日付指定',startDate:$('#mStartDate')?.value||'',endDate:$('#mEndDate')?.value||'',rotationName:$('#mRotationName')?.value||'',rotationOrder:Number($('#mRotationOrder')?.value)||0,cyclic:$('#mCyclic')?.checked!==false,memo:$('#mMemo').value}}
async function removeEntry(type,id){if(!confirm('この記録を削除しますか？'))return;try{const d=await api({action:'delete',type,id});applyBootstrap(d);toast('削除しました')}catch(e){toast(e.message)}}
$('#trashBtn').onclick=openTrash;
function openTrash(){const html=state.trash.length?state.trash.map(x=>`<div class="log-card"><div class="log-top"><div><span class="badge ${x.type==='plan'?'plan':''}">${x.type==='plan'?'予定':'実施'}</span><div class="log-title">${esc(x.action)}</div></div><span class="log-date">${esc(x.date?fmtDate(x.date):(x.seasonText||'日付未定'))}</span></div><div class="log-meta">${esc([x.plantName,x.place,x.category,x.memo].filter(Boolean).join('・'))}</div><div class="actions"><button data-restore="${x.type}:${x.id}">復元する</button></div></div>`).join(''):'<div class="empty">削除済みの記録はありません</div>';showModal('削除済みの記録',html);$$('[data-restore]').forEach(b=>b.onclick=()=>{const[t,id]=b.dataset.restore.split(':');restoreEntry(t,id)})}
async function restoreEntry(type,id){if(!confirm('この記録を復元しますか？'))return;try{const d=await api({action:'restore',type,id});applyBootstrap(d);openTrash();toast('復元しました')}catch(e){toast(e.message)}}
function showModal(title,html,onSave){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=html;$('#modal').classList.add('show');const save=$('#modalSave');if(save&&onSave)save.onclick=onSave}function hideModal(){$('#modal').classList.remove('show')}$('#closeModal').onclick=hideModal;$('#modal').onclick=e=>{if(e.target===$('#modal'))hideModal()};
$$('[data-tab]').forEach(b=>b.onclick=()=>{$$('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));$$('.tab').forEach(x=>x.classList.remove('active'));$(`#tab-${b.dataset.tab}`).classList.add('active');if(b.dataset.tab==='today')renderToday();if(b.dataset.tab==='logs')renderLogs();if(b.dataset.tab==='plans')renderPlans()});
$('#syncBtn').onclick=bootstrap;
bootstrap();
</script>
</body>
</html>
